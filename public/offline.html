<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>Не первая — офлайн</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #09090b;
        color: #fafafa;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      .card {
        max-width: 360px;
        padding: 32px 24px;
        border-radius: 24px;
        background: #18181b;
      }
      h1 { font-size: 1.5rem; margin-top: 12px; }
      p { margin-top: 12px; color: #a1a1aa; line-height: 1.5; }
      .badge {
        display: inline-block;
        color: #ef4444;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="badge">Не первая</p>
      <h1>Нет сети</h1>
      <p>Приложение офлайн. Подключись к интернету и открой снова.</p>
    </div>
  </body>
</html>
